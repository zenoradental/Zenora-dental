<head>
    <meta charset="utf-8"/>

            google: {

    <style>
        body { background-color: #f8fafc; font-family: 'Sora', sans-serif; }
        .status-container { max-width: 600px; margin: 100px auto; padding: 48px; background: white; border-radius: 20px; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.05), 0 0 20px rgba(0,0,0,0.02); }
        .status-header { text-align: center; margin-bottom: 40px; }
        .status-header h1 { font-size: 32px; color: #0f172a; margin-bottom: 16px; font-weight: 700; letter-spacing: -0.5px; word-spacing: 4px; }
        .status-header p { color: #64748b; font-size: 16px; line-height: 1.6; }
        .search-box { display: flex; gap: 12px; margin-bottom: 35px; }
        .search-box input { flex: 1; padding: 15px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; outline: none; transition: border-color 0.2s; }
        .search-box input:focus { border-color: #0f172a; }
        .search-box button { padding: 15px 25px; background: #0f172a; color: #ffffff; border: 2px solid #0f172a; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.25s ease; }
        .search-box button:hover { background: #ffffff; color: #0f172a; transform: translateY(-1px); box-shadow: 0 6px 16px rgba(15, 23, 42, 0.15); }
        .result-card { display: none; padding: 28px; border-radius: 16px; background: #ffffff; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); margin-top: 10px; }
        .result-card.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #e2e8f0; }
        .result-title { font-weight: 600; color: #0f172a; font-size: 18px; }
        .status-badge { padding: 6px 14px; border-radius: 20px; font-size: 14px; font-weight: 600; }
        .status-badge.Pending { background: #fef3c7; color: #d97706; }
        .status-badge.Confirmed { background: #dcfce7; color: #15803d; }
        .status-badge.Completed { background: #e0e7ff; color: #4338ca; }
        .status-badge.Cancelled { background: #fee2e2; color: #b91c1c; }
        .result-row { display: flex; justify-content: space-between; margin-bottom: 16px; font-size: 15px; }
        .result-row:last-child { margin-bottom: 0; }
        .result-row span { color: #64748b; }
        .result-row strong { color: #0f172a; font-weight: 600; text-align: right; }
        .error-msg { color: #dc2626; text-align: center; display: none; margin-top: -20px; margin-bottom: 25px; font-weight: 500; font-size: 15px; }
        .error-msg.active { display: block; }
        @media (max-width: 991px) {
            .main-wrapper { padding-top: 96px !important; padding-bottom: 60px !important; padding-left: 20px !important; padding-right: 20px !important; width: 100% !important; box-sizing: border-box !important; overflow-x: hidden !important; }
            .status-container { margin: 10px auto 40px auto !important; padding: 32px 24px !important; border-radius: 20px !important; width: 100% !important; max-width: 100% !important; box-sizing: border-box !important; box-shadow: 0 16px 35px -5px rgba(0,0,0,0.07) !important; border: 1px solid #f1f5f9 !important; }
            .status-header h1 { font-size: 26px !important; word-spacing: normal !important; line-height: 1.3 !important; }
            .status-header p { font-size: 15px !important; line-height: 1.5 !important; }
            .search-box { flex-direction: column !important; gap: 14px !important; margin-bottom: 28px !important; }
            .search-box input, .search-box button { width: 100% !important; box-sizing: border-box !important; padding: 16px !important; font-size: 16px !important; border-radius: 12px !important; }
            .result-card { padding: 24px !important; border-radius: 16px !important; }
            .result-header { flex-direction: column !important; align-items: flex-start !important; gap: 12px !important; }
            .result-row { flex-direction: column !important; align-items: flex-start !important; gap: 6px !important; margin-bottom: 16px !important; }
            .result-row strong { text-align: left !important; word-break: break-word !important; font-size: 16px !important; }
        }
    </style>
    <link href="assets/css/mobile-responsive.css?v=20260701j" rel="stylesheet" type="text/css"/>
</head>
<body>
    <div class="page-wrapper">
        <!-- Navbar minimal -->
        <div class="navbar_wrap w-nav" style="background: #0f172a;">
            <div class="navbar_container" style="display: flex !important; justify-content: center !important; align-items: center !important; width: 100% !important;">
                <a href="index.html" class="navbar_logo w-nav-brand" style="margin: 0 auto !important; float: none !important; position: static !important; border: none !important; outline: none !important;">
                    <img src="assets/img/zenora-logo-dark.svg" alt="Zenora logo" class="logo_image"/>
                </a>
            </div>
        </div>

        <main class="main-wrapper" style="padding-top: 100px; padding-bottom: 60px;">
            <div class="status-container">
                <div class="status-header">
                    <h1>Track Appointment</h1>
                    <p>Enter your Tracking ID to view the current status of your appointment.</p>
                </div>

                <div class="search-box">
                    <input type="text" id="tracking-id" placeholder="e.g. APT1234">
                    <button type="button" onclick="checkStatus()">Check Status</button>
                </div>
                
                <p class="error-msg" id="error-msg">Appointment not found. Please check your Tracking ID.</p>

                <div class="result-card" id="result-card">
                    <div class="result-header">
                        <span class="result-title">Appointment Details</span>
                        <span class="status-badge" id="status-badge">Pending</span>
                    </div>
                    <div class="result-row"><span>Patient:</span><strong id="res-name">—</strong></div>
                    <div class="result-row"><span>Date:</span><strong id="res-date">—</strong></div>
                    <div class="result-row"><span>Time:</span><strong id="res-time">—</strong></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function checkStatus() {
            const id = document.getElementById('tracking-id').value.trim();
            const errorMsg = document.getElementById('error-msg');
            const resultCard = document.getElementById('result-card');
            
            if(!id) return;

            async function fetchWithFallback(urlPath) {
                try {
                    const res = await fetch(`https://zenora-backend-black.vercel.app${urlPath}`);
                    if (res.ok) return await res.json();
                } catch (e) { console.warn('Vercel fetch failed, trying Render...', e); }
                const res2 = await fetch(`https://zenora-backend-black.vercel.app${urlPath}`);
                if (!res2.ok) throw new Error('Not found');
                return await res2.json();
            }

            fetchWithFallback(`/api/appointments/${id}`)
                .then(data => {
                    errorMsg.classList.remove('active');
                    document.getElementById('res-name').textContent = data.patientName;
                    document.getElementById('res-date').textContent = data.appointmentDate || 'TBD';
                    document.getElementById('res-time').textContent = data.appointmentTime || 'TBD';
                    
                    const badge = document.getElementById('status-badge');
                    badge.textContent = data.status;
                    badge.className = 'status-badge ' + data.status;
                    
                    resultCard.classList.add('active');
                })
                .catch(err => {
                    resultCard.classList.remove('active');
                    errorMsg.classList.add('active');
                });
        }
    </script>
    <script defer src="assets/js/mobile-nav.js"></script>
</body>
</html>
